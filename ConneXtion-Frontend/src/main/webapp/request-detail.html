<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B1B33'/%3E%3Ctext x='50' y='66' font-family='Arial,sans-serif' font-size='44' font-weight='800' fill='%230056D2' text-anchor='middle'%3ECX%3C/text%3E%3C/svg%3E">
        <meta name="theme-color" content="#0B1B33">
        <title>ConneXtion – Detalle de solicitud</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <div class="container wide">
            <div class="logo">
                <h1>ConneXtion</h1>
                <p>Detalle de solicitud</p>
            </div>
            <div id="alertMsg" class="alert" style="display:none;"></div>
            <div class="card">
                <h2>Detalle de la solicitud</h2>
                <div id="issueDetail">
                    <div class="detail-grid">
                        <div><span class="skeleton skeleton-text w-60" style="height:.7rem; margin-bottom:.5rem;"></span><span class="skeleton skeleton-text w-80"></span></div>
                        <div><span class="skeleton skeleton-text w-60" style="height:.7rem; margin-bottom:.5rem;"></span><span class="skeleton skeleton-badge"></span></div>
                        <div><span class="skeleton skeleton-text w-60" style="height:.7rem; margin-bottom:.5rem;"></span><span class="skeleton skeleton-text w-40"></span></div>
                        <div><span class="skeleton skeleton-text w-60" style="height:.7rem; margin-bottom:.5rem;"></span><span class="skeleton skeleton-text w-40"></span></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>Comentarios</h2>
                <ul id="commentsList" class="comments-list"></ul>
            </div>
            <div class="card">
                <h2>Agregar comentario</h2>
                <form id="commentForm">
                    <div class="form-group">
                        <label for="commentDescription">Comentario *</label>
                        <textarea id="commentDescription" required></textarea>
                    </div>
                    <div class="actions">
                        <button type="submit">Agregar comentario</button>
                        <a class="btn btn-secondary" href="my-requests.html">Volver</a>
                    </div>
                </form>
            </div>
            <div class="link-row">
                <a href="dashboard.html">Inicio</a>
            </div>
        </div>
        <script src="js/api.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/request-detail.js"></script>
    </body>
</html>
