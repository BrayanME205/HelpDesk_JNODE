<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B1B33'/%3E%3Ctext x='50' y='66' font-family='Arial,sans-serif' font-size='44' font-weight='800' fill='%230056D2' text-anchor='middle'%3ECX%3C/text%3E%3C/svg%3E">
        <meta name="theme-color" content="#0B1B33">
        <title>Panel de Supervisor - ConneXtion</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/supervisor.css">
    </head>
    <body>
        <div class="container">
            <div class="back-link-row">
                <a href="dashboard.html"><button type="button">← Volver a la página principal</button></a>
            </div>
            <h1>Asignación de Tiquetes</h1>
            <div class="table-card" style="box-shadow:none; border:1px solid var(--border);">
                <table id="issuesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Reporte #</th>
                            <th>Descripción</th>
                            <th>Prioridad</th>
                            <th>Asignar Soportista</th>
                            <th>Acción</th>
                            <th>Iniciar</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="7" style="padding:0;">
                                <div class="skeleton-row"><span class="skeleton skeleton-text skeleton-cell-sm"></span><span class="skeleton skeleton-text skeleton-cell-sm"></span><span class="skeleton skeleton-text skeleton-cell-lg"></span><span class="skeleton skeleton-text skeleton-cell-sm"></span><span class="skeleton skeleton-badge"></span></div>
                            </td></tr>
                        <tr><td colspan="7" style="padding:0;">
                                <div class="skeleton-row"><span class="skeleton skeleton-text skeleton-cell-sm"></span><span class="skeleton skeleton-text skeleton-cell-sm"></span><span class="skeleton skeleton-text skeleton-cell-lg"></span><span class="skeleton skeleton-text skeleton-cell-sm"></span><span class="skeleton skeleton-badge"></span></div>
                            </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <script src="js/supervisor.js"></script>
    </body>
</html>
