<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar solicitud</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="pageHeader"></div>

    <div class="container">
        <div class="card">
            <h2>Nueva solicitud</h2>

            <form id="issueForm">
                <div class="form-group">
                    <label for="description">Descripción *</label>
                    <textarea id="description" maxlength="1000" required></textarea>
                </div>

                <div class="form-group">
                    <label for="contactPhone">Teléfono de contacto</label>
                    <input type="text" id="contactPhone" maxlength="20">
                </div>

                <div class="form-group">
                    <label for="contactEmail">Correo de contacto</label>
                    <input type="email" id="contactEmail" maxlength="150">
                </div>

                <div class="form-group">
                    <label for="referenceAddress">Dirección de referencia</label>
                    <input type="text" id="referenceAddress" maxlength="200">
                </div>

                <div class="form-group">
                    <label for="serviceId">Servicio *</label>
                    <select id="serviceId" required></select>
                </div>

                <div class="actions">
                    <button type="submit">Registrar solicitud</button>
                    <a class="btn btn-secondary" href="my-requests.html">Ver mis solicitudes</a>
                </div>
            </form>

            <div id="messageContainer"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/new-request.js"></script>
</body>
</html>
