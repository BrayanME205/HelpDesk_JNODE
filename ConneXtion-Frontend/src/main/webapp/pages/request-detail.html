<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de solicitud</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="pageHeader"></div>

    <div class="container">
        <div class="card">
            <h2>Detalle de la solicitud</h2>
            <div id="issueDetail"></div>
        </div>

        <div class="card">
            <h2>Comentarios</h2>
            <ul id="commentsList" class="comments-list"></ul>
        </div>

        <div class="card">
            <h2>Agregar comentario</h2>
            <form id="commentForm">
                <div class="form-group">
                    <label for="commentDescription">Comentario *</label>
                    <textarea id="commentDescription" maxlength="1000" required></textarea>
                </div>

                <div class="actions">
                    <button type="submit">Agregar comentario</button>
                    <a class="btn btn-secondary" href="my-requests.html">Volver al listado</a>
                </div>
            </form>

            <div id="messageContainer"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/request-detail.js"></script>
</body>
</html>
