<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ConneXtion – Registro</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <div class="container wide">
            <div class="logo">
                <h1>ConneXtion</h1>
                <p>Crear nueva cuenta</p>
            </div>

            <div id="alertMsg" class="alert"></div>

            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" id="name" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label>Primer apellido *</label>
                <input type="text" id="firstSurname" placeholder="Primer apellido">
            </div>
            <div class="form-group">
                <label>Segundo apellido *</label>
                <input type="text" id="secondSurname" placeholder="Segundo apellido">
            </div>
            <div class="form-group">
                <label>Correo electrónico *</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label>Contraseña *</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label>Dirección física</label>
                <input type="text" id="address" placeholder="Opcional">
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" id="phone" placeholder="Opcional">
            </div>
            <div class="form-group">
                <label>Segundo contacto</label>
                <input type="text" id="secondContact" placeholder="Opcional">
            </div>
            <div class="form-group">
                <label>Servicios contratados *</label>
                <div class="services-grid" id="servicesGrid">
                    <p style="color:#999; font-size:.85rem">Cargando servicios...</p>
                </div>
            </div>

            <button class="btn" onclick="registerClient()">Crear cuenta</button>
            <div class="link-row">
                ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
            </div>
        </div>
        <script src="js/auth.js"></script>
        <script> loadServices();</script>
    </body>
</html>
