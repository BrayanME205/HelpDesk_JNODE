<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Resolución de Tiquetes - ConneXtion</title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/supervisor.css">
    </head>
    <body>

        <div class="container">
            <h1>Cerrar Tiquete</h1>
            <p>Ingresa el número del reporte en el que trabajaste y la solución aplicada.</p>

            <form id="resolveForm">
                <div class="form-group">
                    <label for="issueId">Número de Reporte (ID):</label>
                    <input type="number" id="issueId" required placeholder="Ej: 1">
                </div>

                <div class="form-group">
                    <label for="resolutionComment">Comentario de Resolución:</label>
                    <textarea id="resolutionComment" required placeholder="Describe qué hiciste para solucionar el problema..."></textarea>
                </div>

                <button type="submit">Resolver Tiquete</button>
            </form> 

        </div>

        <script>
            function goBack() {
                const role = sessionStorage.getItem('role');
                if (role === 'SUPERVISOR') {
                    window.location.href = 'supervisor.html';
                } else {
                    window.location.href = 'supporter.html';
                }
            }
        </script>

        <script src="js/resolution.js"></script>
    </body>
</html>
