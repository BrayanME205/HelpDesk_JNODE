<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B1B33'/%3E%3Ctext x='50' y='66' font-family='Arial,sans-serif' font-size='44' font-weight='800' fill='%230056D2' text-anchor='middle'%3ECX%3C/text%3E%3C/svg%3E">
        <meta name="theme-color" content="#0B1B33">
    <title>ConneXtion – Nueva solicitud</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container wide">
        <div class="logo">
            <h1>ConneXtion</h1>
            <p>Registrar nueva solicitud</p>
        </div>
        <div id="alertMsg" class="alert"></div>
        <div class="form-group">
            <label for="description">Descripción *</label>
            <textarea id="description" placeholder="Describe el problema" rows="5"></textarea>
        </div>
        <div class="form-group">
            <label for="contactPhone">Teléfono de contacto</label>
            <input type="text" id="contactPhone" placeholder="Opcional">
        </div>
        <div class="form-group">
            <label for="contactEmail">Correo de contacto</label>
            <input type="email" id="contactEmail" placeholder="Opcional">
        </div>
        <div class="form-group">
            <label for="referenceAddress">Dirección de referencia</label>
            <input type="text" id="referenceAddress" placeholder="Opcional">
        </div>
        <div class="form-group">
            <label for="serviceId">Servicio *</label>
            <select id="serviceId">
                <option value="">Seleccione un servicio</option>
            </select>
        </div>
        <button class="btn" onclick="createIssue()">Registrar solicitud</button>
        <div class="link-row">
            <a href="my-requests.html">Ver mis solicitudes</a> |
            <a href="dashboard.html">Volver al inicio</a>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/new-request.js"></script>
</body>
</html>
