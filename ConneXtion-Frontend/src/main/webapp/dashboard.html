<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion – Inicio</title>
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body {
            display: block;
            padding: 1.5rem;
            background: #f0f2f5;
        }

        .navbar {
            background: #0056b3;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .navbar h1 {
            font-size: 1.2rem;
            margin: 0;
        }

        .navbar .user-info {
            font-size: .85rem;
            opacity: .85;
            margin-top: .2rem;
        }

        .navbar button {
            background: rgba(255,255,255,.2);
            border: 1px solid rgba(255,255,255,.5);
            color: white;
            padding: .4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .navbar button:hover {
            background: rgba(255,255,255,.35);
        }

        .welcome-card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0,0,0,.07);
            margin-bottom: 1.5rem;
        }

        .welcome-card h2 {
            margin: 0 0 .3rem;
            color: #333;
        }

        .welcome-card p {
            margin: 0;
            color: #666;
            font-size: .9rem;
        }

        .role-badge {
            display: inline-block;
            padding: .2rem .7rem;
            border-radius: 20px;
            font-size: .78rem;
            font-weight: 600;
            margin-left: .5rem;
            vertical-align: middle;
        }

        .badge-CLIENT {
            background: #e3f2fd;
            color: #1565c0;
        }

        .badge-SUPPORTER {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-SUPERVISOR {
            background: #fff3e0;
            color: #e65100;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
            gap: 1rem;
        }

        .action-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            display: none; /* ocultas hasta decidir según rol */
        }

        .action-card:hover {
            border-color: #0056b3;
            transform: translateY(-2px);
        }

        .action-card .icon {
            font-size: 2rem;
            margin-bottom: .5rem;
        }

        .action-card .label {
            font-size: .9rem;
            color: #444;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div>
            <h1>ConneXtion Help Desk</h1>
            <div class="user-info" id="userInfo"></div>
        </div>
        <button onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="welcome-card">
        <h2>
            Bienvenido, <span id="userName"></span>
            <span class="role-badge" id="roleBadge"></span>
        </h2>
        <p>Selecciona una opción para continuar.</p>
    </div>

    <div class="actions-grid">

        <!-- CLIENT -->
        <div class="action-card" id="cardMyRequests">
            <div class="icon">📋</div>
            <div class="label">Mis solicitudes</div>
        </div>

        <div class="action-card" id="cardNewRequest">
            <div class="icon">➕</div>
            <div class="label">Nueva solicitud</div>
        </div>

        <!-- SUPPORT -->
        <div class="action-card" id="cardSupportRequests">
            <div class="icon">📋</div>
            <div class="label">Ver solicitudes</div>
        </div>

        <!-- SUPERVISOR -->
        <div class="action-card" id="cardRegisterSupport">
            <div class="icon">👤</div>
            <div class="label">Registrar soportista</div>
        </div>

    </div>

    <script src="js/auth.js"></script>
    <script>
        const role = sessionStorage.getItem('role');
        const name = sessionStorage.getItem('userName');
        const email = sessionStorage.getItem('email') || '';

        if (!role || !name) {
            window.location.href = 'index.html';
        }

        document.getElementById('userName').textContent = name;
        document.getElementById('userInfo').textContent = email;

        const labels = {
            CLIENT: 'Cliente',
            SUPPORTER: 'Soportista',
            SUPERVISOR: 'Supervisor'
        };

        const badge = document.getElementById('roleBadge');
        badge.textContent = labels[role] || role;
        badge.className = `role-badge badge-${role}`;

        const cardMyRequests = document.getElementById('cardMyRequests');
        const cardNewRequest = document.getElementById('cardNewRequest');
        const cardSupportRequests = document.getElementById('cardSupportRequests');
        const cardRegisterSupport = document.getElementById('cardRegisterSupport');

        if (role === 'CLIENT') {
            cardMyRequests.style.display = 'block';
            cardNewRequest.style.display = 'block';

            cardMyRequests.addEventListener('click', function () {
                window.location.href = 'my-requests.html';
            });

            cardNewRequest.addEventListener('click', function () {
                window.location.href = 'new-request.html';
            });
        }

        if (role === 'SUPPORTER' || role === 'SUPERVISOR') {
            cardSupportRequests.style.display = 'block';
        }

        if (role === 'SUPERVISOR') {
            cardRegisterSupport.style.display = 'block';

            cardRegisterSupport.addEventListener('click', function () {
                window.location.href = 'support-register.html';
            });
        }
    </script>

</body>
</html>
