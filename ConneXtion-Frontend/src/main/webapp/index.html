<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ConneXtion – Iniciar Sesión</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <div class="container">
            <div class="logo">
                <h1>ConneXtion</h1>
                <p>Servicios de telecomunicaciones</p>
            </div>
            <h2>Iniciar Sesión</h2>

            <div id="alertMsg" class="alert"></div>

            <div class="form-group">
                <label>Correo electrónico *</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label>Contraseña *</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn" onclick="loginUser()">Ingresar</button>

            <div class="link-row">
                ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
            </div>
        </div>
        <script src="js/auth.js"></script>
        <script>
                if (sessionStorage.getItem('userId')) {
                    window.location.href = 'dashboard.html';
                }
        </script>
    </body>
</html>
