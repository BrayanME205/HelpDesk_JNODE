<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B1B33'/%3E%3Ctext x='50' y='66' font-family='Arial,sans-serif' font-size='44' font-weight='800' fill='%230056D2' text-anchor='middle'%3ECX%3C/text%3E%3C/svg%3E">
        <meta name="theme-color" content="#0B1B33">
        <title>ConneXtion – Iniciar Sesión</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <div class="container">
            <div class="logo">
                <h1>ConneXtion</h1>
                <p>Servicios de telecomunicaciones</p>
            </div>
            <h2>Iniciar Sesión</h2>
            <div id="alertMsg" class="alert"></div>
            <div class="form-group">
                <label>Correo electrónico *</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label>Contraseña *</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="loginUser()">Ingresar</button>
            <div class="link-row">
                ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
            </div>
        </div>
        <script src="js/auth.js"></script>
        <script>
                if (sessionStorage.getItem('userId')) {
                    window.location.href = 'dashboard.html';
                }
        </script>
    </body>
</html>
